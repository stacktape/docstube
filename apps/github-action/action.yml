name: docstube
description: Refresh docstube documentation and open or update a pull request.
inputs:
  mode:
    description: Run docstube refresh or validate.
    required: false
    default: refresh
  github-token:
    description: GitHub token used by the gh CLI to open or update the PR.
    required: false
  base-branch:
    description: Branch to update from and target with the PR.
    required: false
  branch-prefix:
    description: Prefix for the generated refresh branch.
    required: false
    default: docstube/refresh
  commit-message:
    description: Commit message for generated documentation changes.
    required: false
    default: 'docs: refresh docstube output'
  config-path:
    description: Optional docstube config path.
    required: false
  docstube-package:
    description: npm package spec used by npx to run docstube.
    required: false
    default: docstube@latest
  workspace:
    description: Checked-out repository path.
    required: false
  dry-run:
    description: Run refresh and report the PR body without committing, pushing, or opening a PR.
    required: false
    default: 'false'
outputs:
  changed:
    description: Whether docstube left generated documentation changes.
  branch-name:
    description: Branch name used for docstube refresh changes.
  changed-files:
    description: JSON array of changed files.
  changed-pages:
    description: JSON array of changed pages and reasons.
  pull-request-url:
    description: URL of the opened or updated pull request.
  concurrency-group:
    description: Suggested workflow concurrency group for this refresh run.
runs:
  using: node24
  main: dist/github-action.mjs
